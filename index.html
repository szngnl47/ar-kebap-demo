<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AR Menü Demo</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff7ed;
      color: #171717;
    }

    .page {
      max-width: 520px;
      margin: 0 auto;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 18px 50px rgba(0,0,0,0.14);
    }

    .food-img {
      width: 100%;
      display: block;
      background: #fff1df;
    }

    .content {
      padding: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .price {
      font-size: 22px;
      font-weight: bold;
      color: #dc2626;
      margin-bottom: 12px;
    }

    .desc {
      color: #555;
      line-height: 1.5;
    }

    .ar-link {
      display: block;
      position: relative;
      text-align: center;
      text-decoration: none;
      border-radius: 16px;
      background: #dc2626;
      color: white;
      padding: 16px;
      font-size: 17px;
      font-weight: bold;
      margin-top: 16px;
      overflow: hidden;
    }

    .ar-link img {
      width: 1px;
      height: 1px;
      opacity: 0.01;
      position: absolute;
      left: 0;
      top: 0;
    }

    .note {
      margin-top: 12px;
      color: #777;
      font-size: 13px;
      line-height: 1.4;
    }

    .test-link {
      display: block;
      margin-top: 12px;
      color: #dc2626;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>

<body>
  <main class="page">
    <h2>Demo Kebapçı</h2>

    <section class="card">
      <img class="food-img" src="./kebap-photo.svg" alt="Kebap fotoğrafı">

      <div class="content">
        <h1>Adana Kebap</h1>
        <div class="price">14,90 €</div>

        <p class="desc">
          Izgara kebap, közlenmiş biber, domates ve lavaş ile servis edilir.
        </p>

        <a class="ar-link" rel="ar" href="./25.05.2026.usdz">
          <img src="./kebap-photo.svg" alt="">
          Masada Görüntüle
        </a>

        <a class="test-link" href="./25.05.2026.usdz">
          Direkt USDZ test linki
        </a>

        <p class="note">
          iPhone’da Safari ile aç. “Masada Görüntüle”ye basınca AR Quick Look açılmalı.
          Açılmazsa önce “Direkt USDZ test linki”ne bas.
        </p>
      </div>
    </section>
  </main>
</body>
</html>
